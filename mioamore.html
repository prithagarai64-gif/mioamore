// ── THREE HERO ──
function ThreeHero(){
  const ref=useRef();
  useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const W=()=>canvas.parentElement.clientWidth, H=()=>canvas.parentElement.clientHeight;
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W(),H()); renderer.setClearColor(0,0);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(58,W()/H(),0.1,100);
    camera.position.set(0,0,6);
    scene.add(new THREE.AmbientLight(0xffffff,0.2));
    const L1=new THREE.PointLight(0x7C3AED,5,14); L1.position.set(2,3,2); scene.add(L1);
    const L2=new THREE.PointLight(0xC026D3,4,12); L2.position.set(-3,-1,1); scene.add(L2);
    const geos=[new THREE.TorusGeometry(0.5,0.18,14,64),new THREE.OctahedronGeometry(0.42),new THREE.IcosahedronGeometry(0.38),new THREE.TorusKnotGeometry(0.3,0.09,90,14),new THREE.DodecahedronGeometry(0.38)];
    const cols=[0x7C3AED,0xA855F7,0x6B21A8,0xC026D3,0x9333EA,0xE879F9];
    const shapes=Array.from({length:20},(_,i)=>{
      const wf=i%6===0;
      const m=new THREE.Mesh(geos[i%geos.length],new THREE.MeshStandardMaterial({color:cols[i%cols.length],roughness:0.2,metalness:0.85,wireframe:wf,transparent:true,opacity:wf?0.3:0.9}));
      const ang=(i/20)*Math.PI*2+Math.random(), r=2.8+Math.random()*2.2;
      m.position.set(Math.cos(ang)*r*1.5,(Math.random()-0.5)*4.5,-1-Math.random()*4);
      m.scale.setScalar(0.45+Math.random()*0.85);
      m.userData={spd:0.004+Math.random()*0.009,fSpd:0.5+Math.random(),fAmp:0.12+Math.random()*0.15,fOff:Math.random()*Math.PI*2,r,ang,oSpd:(Math.random()-0.5)*0.003};
      scene.add(m); return m;
    });
    const pPos=new Float32Array(150*3);
    for(let i=0;i<150;i++){pPos[i*3]=(Math.random()-.5)*22;pPos[i*3+1]=(Math.random()-.5)*14;pPos[i*3+2]=(Math.random()-.5)*10-4;}
    const pGeo=new THREE.BufferGeometry(); pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
    scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xC4B5FD,size:0.022,transparent:true,opacity:0.65})));
    let mx=0,my=0;
    const onMouse=e=>{mx=(e.clientX/innerWidth-0.5)*2;my=-(e.clientY/innerHeight-0.5)*2;};
    window.addEventListener("mousemove",onMouse);
    const onResize=()=>{renderer.setSize(W(),H());camera.aspect=W()/H();camera.updateProjectionMatrix();};
    window.addEventListener("resize",onResize);
    const clk=new THREE.Clock(); let aid;
    const animate=()=>{
      aid=requestAnimationFrame(animate); const t=clk.getElapsedTime();
      shapes.forEach(s=>{
        s.userData.ang+=s.userData.oSpd;
        s.position.x=Math.cos(s.userData.ang)*s.userData.r*1.5;
        s.position.y+=Math.sin(t*s.userData.fSpd+s.userData.fOff)*s.userData.fAmp*0.01;
        s.rotation.x+=s.userData.spd*0.7; s.rotation.y+=s.userData.spd;
      });
      camera.position.x+=(mx*0.5-camera.position.x)*0.04;
      camera.position.y+=(my*0.3-camera.position.y)*0.04;
      camera.lookAt(0,0,0);
      L1.position.set(Math.sin(t*0.4)*4,Math.cos(t*0.3)*2,2);
      renderer.render(scene,camera);
    };
    animate();
    return()=>{cancelAnimationFrame(aid);window.removeEventListener("mousemove",onMouse);window.removeEventListener("resize",onResize);renderer.dispose();};
  },[]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}}/>;
}

// ── THREE CAKE ──
function ThreeCake({sectionRef}){
  const ref=useRef();
  const [panel,setPanel]=useState(0);
  const panels=[
    {side:"left",eye:"Chapter 01",title:"Baked Fresh\nEvery Single Day",desc:"Our bakers arrive before dawn. No preservatives. No shortcuts. Pure honest baking — the way it's always been."},
    {side:"right",eye:"Chapter 02",title:"Art in\nEvery Tier",desc:"Hand-decorated by skilled artisans. From fondant florals to intricate piping — every order is a canvas."},
    {side:"left",eye:"Chapter 03",title:"Made for\nYour Moments",desc:"Three decades of making celebrations sweeter. Mio Amore has always been there for your special moments."},
  ];
  useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const el=canvas.parentElement;
    const W=()=>el.clientWidth, H=()=>el.clientHeight;
    const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(W(),H()); renderer.shadowMap.enabled=true; renderer.setClearColor(0,0);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(45,W()/H(),0.1,100);
    camera.position.set(0,1.5,6.5); camera.lookAt(0,0.5,0);
    scene.add(new THREE.AmbientLight(0xfff0ff,0.5));
    const spot=new THREE.SpotLight(0xffffff,3,20,Math.PI/5,0.3);
    spot.position.set(0,8,4); spot.castShadow=true; scene.add(spot);
    const VL=new THREE.PointLight(0x7C3AED,4,14); VL.position.set(-4,2,-2); scene.add(VL);
    const FL=new THREE.PointLight(0xC026D3,3,12); FL.position.set(4,1,2); scene.add(FL);
    const cake=new THREE.Group(); scene.add(cake);
    const layer=(r,h,col,y)=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r*1.02,h,64),new THREE.MeshStandardMaterial({color:col,roughness:0.45,metalness:0.15}));m.position.y=y;m.castShadow=true;return m;};
    const frost=(r,y)=>{const m=new THREE.Mesh(new THREE.TorusGeometry(r*0.87,0.095,10,64),new THREE.MeshStandardMaterial({color:0xEDE9FE,roughness:0.3}));m.position.y=y;return m;};
    const band=(r,y)=>{const m=new THREE.Mesh(new THREE.TorusGeometry(r,0.035,6,64),new THREE.MeshStandardMaterial({color:0xC4B5FD,metalness:0.95,roughness:0.05}));m.position.y=y;return m;};
    cake.add(layer(1.0,0.72,0x3B0764,-0.86),frost(1.0,-0.51),band(1.01,-0.86));
    cake.add(layer(0.70,0.62,0x6B21A8,-0.19),frost(0.70,0.10),band(0.71,-0.19));
    cake.add(layer(0.46,0.52,0x7C3AED,0.55),frost(0.46,0.80),band(0.47,0.55));
    const topper=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,16),new THREE.MeshStandardMaterial({color:0xC4B5FD,metalness:1,roughness:0.04,emissive:0xA855F7,emissiveIntensity:0.6}));
    topper.position.y=1.1; cake.add(topper);
    const flames=[];
    [[0.3,0],[-0.22,0.22],[0.05,-0.32]].forEach(([cx,cz])=>{
      const c=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.26,8),new THREE.MeshStandardMaterial({color:0xEDE9FE,emissive:0xC4B5FD,emissiveIntensity:0.3}));
      c.position.set(cx,0.93,cz); cake.add(c);
      const f=new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),new THREE.MeshStandardMaterial({color:0xE879F9,emissive:0xC026D3,emissiveIntensity:3.5,transparent:true,opacity:0.92}));
      f.position.set(cx,1.12,cz); f.userData.by=1.12; cake.add(f); flames.push(f);
    });
    const plate=new THREE.Mesh(new THREE.CylinderGeometry(1.35,1.35,0.065,64),new THREE.MeshStandardMaterial({color:0xFAF5FF,roughness:0.2,metalness:0.35}));
    plate.position.y=-1.25; cake.add(plate);
    const gnd=new THREE.Mesh(new THREE.CircleGeometry(3.5,64),new THREE.MeshStandardMaterial({color:0x080012,roughness:0.9}));
    gnd.rotation.x=-Math.PI/2; gnd.position.y=-1.29; gnd.receiveShadow=true; scene.add(gnd);
    let tY=0,fY=0;
    const onScroll=()=>{
      const sec=sectionRef.current; if(!sec)return;
      const rect=sec.getBoundingClientRect();
      const prog=Math.max(0,Math.min(1,-rect.top/(sec.offsetHeight-innerHeight)));
      tY=prog*Math.PI*4;
      camera.position.z=6.5-prog*1.8;
      setPanel(Math.min(Math.floor(prog*3),2));
    };
    window.addEventListener("scroll",onScroll,{passive:true}); onScroll();
    const onResize=()=>{renderer.setSize(W(),H());camera.aspect=W()/H();camera.updateProjectionMatrix();};
    window.addEventListener("resize",onResize);
    const clk=new THREE.Clock(); let aid;
    const animate=()=>{
      aid=requestAnimationFrame(animate); const t=clk.getElapsedTime();
      fY+=(tY-fY)*0.05;
      cake.rotation.y=fY; cake.position.y=Math.sin(t*0.6)*0.055;
      flames.forEach(f=>{f.position.y=f.userData.by+Math.sin(t*13)*0.016;f.scale.setScalar(0.88+Math.sin(t*11)*0.14);});
      VL.intensity=3+Math.sin(t*0.9)*1.2;
      renderer.render(scene,camera);
    };
    animate();
    return()=>{cancelAnimationFrame(aid);window.removeEventListener("scroll",onScroll);window.removeEventListener("resize",onResize);renderer.dispose();};
  },[]);
  return(
    <div style={{position:"sticky",top:0,height:"100vh",overflow:"hidden"}}>
      <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%"}}/>
      {panels.map((p,i)=>(
        <div key={i} className="panel-trans" style={{position:"absolute",top:"50%",...(p.side==="left"?{left:"5%"}:{right:"5%"}),transform:panel===i?"translateY(-50%)":"translateY(calc(-50% + 20px))",opacity:panel===i?1:0,maxWidth:340,padding:"36px 32px",textAlign:p.side==="right"?"right":"left",zIndex:10,background:"rgba(8,0,18,0.55)",backdropFilter:"blur(18px)",border:"1px solid rgba(196,181,253,0.12)",borderRadius:4}}>
          <p style={{fontSize:"0.58rem",letterSpacing:"0.4em",color:"#A855F7",textTransform:"uppercase",marginBottom:10}}>{p.eye}</p>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.6rem,2.5vw,2.4rem)",fontWeight:400,color:"#FAF5FF",lineHeight:1.2,marginBottom:14,whiteSpace:"pre-line"}}>{p.title}</h3>
          <p style={{fontSize:"0.85rem",lineHeight:1.85,color:"rgba(196,181,253,0.62)",fontWeight:300}}>{p.desc}</p>
        </div>
      ))}
    </div>
  );
}

// ── APP ROOT ──
function App(){
  const [page,setPage]=useState("home");
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [wishlist,setWishlist]=useState(new Set());
  const [toast,setToast]=useState(null);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2600);};
  const addToCart=item=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.id===item.id);
      if(ex)return prev.map(i=>i.id===item.id?{...i,qty:i.qty+1}:i);
      return[...prev,{...item,qty:1}];
    });
    showToast(item.name+" added to cart");
  };
  const changeQty=(id,delta)=>setCart(prev=>prev.map(i=>i.id===id?{...i,qty:i.qty+delta}:i).filter(i=>i.qty>0));
  const toggleWish=id=>setWishlist(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const pp={setPage,onAdd:addToCart,wishlist,toggleWish};
  return(
    <>
      <Navbar page={page} setPage={setPage} cartCount={cartCount} openCart={()=>setCartOpen(true)}/>
      <CartDrawer cart={cart} open={cartOpen} onClose={()=>setCartOpen(false)} onQty={changeQty}/>
      {page==="home"&&<HomePage {...pp}/>}
      {page==="cakes"&&<CakesPage {...pp}/>}
      {page==="pastries"&&<PastriesPage {...pp}/>}
      {page==="savories"&&<SavoriesPage {...pp}/>}
      {page==="desserts"&&<DessertsPage {...pp}/>}
      {page==="cookies"&&<CookiesPage {...pp}/>}
      {page==="stores"&&<StoresPage/>}
      {toast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#4A1580,#7C3AED)",color:"#fff",padding:"13px 26px",borderRadius:4,fontSize:"0.8rem",letterSpacing:"0.07em",zIndex:9999,animation:"toastPop 0.3s ease",boxShadow:"0 10px 36px rgba(124,58,237,0.5)",border:"1px solid rgba(196,181,253,0.2)",display:"flex",alignItems:"center",gap:9,whiteSpace:"nowrap"}}>
          <IcCheck size={15} color="#C4B5FD"/>{toast}
        </div>
      )}
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
